<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 28" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="4" role="img" aria-label="Everflow">
  <title>everflow — flow chevrons</title>
  <desc>Three chevrons stepping forward. Trailing two grey (merged / in-review), leading one green (in flight). Reads as a shell prompt.</desc>
  <!-- Trailing chevron: merged -->
  <polyline points="4,4 14,14 4,24" stroke="#17191e" stroke-opacity="0.32"/>
  <!-- Middle chevron: in-review -->
  <polyline points="22,4 32,14 22,24" stroke="#17191e" stroke-opacity="0.62"/>
  <!-- Leading chevron: in-flight, merge-green -->
  <polyline points="40,4 50,14 40,24" stroke="#159a5c"/>
</svg>
