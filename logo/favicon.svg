<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" role="img" aria-label="Syntropy favicon">
  <title>syntropy — chaos converging into order</title>
  <!-- Square-cropped reduction of mark.svg: only the two end states (scattered grey, aligned cyan) survive 16×16. -->
  <defs>
    <filter id="favicon-glow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>
  <rect x="8" y="8" width="7" height="7" rx="1.26" fill="#00d2d3" opacity="0.25" filter="url(#favicon-glow)"/>
  <rect x="1" y="1" width="6" height="6" rx="1.08" fill="#57575e" transform="rotate(-35 4 4)"/>
  <rect x="8" y="8" width="7" height="7" rx="1.26" fill="#00d2d3"/>
</svg>
